name: Build LeadLoss executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python: "3.10"
            platform: windows
          - os: macos-15-intel
            python: "3.10"
            platform: macos


    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        shell: bash
        run: |
          # Do NOT upgrade pip to the newest possible version; we just need a stable pip.
          python -m pip install --upgrade pip

          # Critical: 'ad' (dependency of soerp) needs setuptools<58 (use_2to3 support)
          python -m pip install "setuptools==57.5.0" wheel

          # Install ad using the current environment (no build isolation), so it uses setuptools 57.5.0
          python -m pip install --no-build-isolation "ad==1.3.2"

          # Now install the app requirements (also without build isolation to avoid re-building ad with newer setuptools)
          python -m pip install --no-build-isolation -r requirements-app.txt

          python -m pip install pyinstaller pyinstaller-hooks-contrib

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools==57.5.0" wheel
          python -m pip install --no-build-isolation "ad==1.3.2"
          python -m pip install --no-build-isolation -r requirements-app.txt
          python -m pip install pyinstaller pyinstaller-hooks-contrib

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools==57.5.0" wheel
          python -m pip install --no-build-isolation "ad==1.3.2"
          python -m pip install --no-build-isolation -r requirements-app.txt
          python -m pip install pyinstaller pyinstaller-hooks-contrib


      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeadLoss-${{ matrix.platform }}
          path: |
            LeadLoss-*.zip

  release:
    name: Publish GitHub Release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-artifacts/**/LeadLoss-*.zip
