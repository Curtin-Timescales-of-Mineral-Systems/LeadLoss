name: Build LeadLoss executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python: "3.10"
            platform: windows
          - os: macos-15-intel
            python: "3.10"
            platform: macos


    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-app.txt
          python -m pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name LeadLoss `
            --icon "resources/icon.ico" `
            --hidden-import pkg_resources.py2_warn `
            --add-data "resources;resources" `
            src/application.py
          Compress-Archive -Path dist/LeadLoss.exe -DestinationPath LeadLoss-windows.zip

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --windowed --name LeadLoss \
            --hidden-import pkg_resources.py2_warn \
            --add-data "resources:resources" \
            src/application.py
          ditto -c -k --sequesterRsrc --keepParent "dist/LeadLoss.app" "LeadLoss-macos.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeadLoss-${{ matrix.platform }}
          path: |
            LeadLoss-*.zip

  release:
    name: Publish GitHub Release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-artifacts/**/LeadLoss-*.zip
